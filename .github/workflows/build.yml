name: "DataGen"

on: push

jobs:
  setup_environment:
    name: "Generate Data"
    runs-on: ubuntu-latest
    steps:
      - name: "check_out"
        uses: actions/checkout@v6
      - name: "setup_java"
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "microsoft"
          architecture: "x64"
      - name: "setup_gradle"
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper
  gen_data:
    - name: "generate_data"
      run: "./gradlew downloadAssets compileJava runData"
      working-directory: "./FSEPlayerStuff/"
