name: "Build Test"

on: push

jobs:
  build:
    name: "build"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "check-out"
        uses: actions/checkout@v6
      - name: "setup-java"
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "microsoft"
      - name: "setup-gradle"
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper
      - name: "build"
        run: ./gradlew build jar
